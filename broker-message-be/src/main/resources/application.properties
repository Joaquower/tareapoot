spring.application.name=broker-message-be

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/retry_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.consumer.group-id=retry-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Mail Configuration (MailHog)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Scheduling
spring.task.scheduling.pool.size=5

# Custom Properties for Endpoints to retry
endpoint.payment=http://localhost:8081/api/payments
endpoint.order=http://localhost:8082/api/orders
endpoint.product=http://localhost:8083/api/products
